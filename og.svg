  <!-- kv block -->
  <text x="72" y="447"
        font-family="'JetBrains Mono', 'Fira Mono', monospace" font-size="14"
        fill="#6e6e6a">role .........</text>
  <text x="244" y="447"
        font-family="'JetBrains Mono', 'Fira Mono', monospace" font-size="14"
        fill="#e4e4e0">OneHQ (5 years)</text>

  <text x="72" y="470"
        font-family="'JetBrains Mono', 'Fira Mono', monospace" font-size="14"
        fill="#6e6e6a">focus ........</text>
  <text x="244" y="470"
        font-family="'JetBrains Mono', 'Fira Mono', monospace" font-size="14"
        fill="#e4e4e0">complex workflows · dense UI · design systems</text>

  <text x="72" y="493"
        font-family="'JetBrains Mono', 'Fira Mono', monospace" font-size="14"
        fill="#6e6e6a">status .......</text>
  <text x="244" y="493"
        font-family="'JetBrains Mono', 'Fira Mono', monospace" font-size="14"
