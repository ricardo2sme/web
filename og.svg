  <text x="94" y="558"
        font-family="'JetBrains Mono', 'Fira Mono', monospace" font-size="14"
        fill="#6e6e6a">ricardo2s.me</text>

  <!-- right side tag -->
  <text x="1128" y="558" text-anchor="end"
